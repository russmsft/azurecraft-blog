<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="map-title map-desc">
  <title id="map-title">Multi-Agent Patterns</title>
  <desc id="map-desc">Five patterns: Sequential, Concurrent, Group Chat, Handoff, and Magentic.</desc>
  <defs>
    <marker id="arr2" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="540" rx="12" fill="#f8fafc"/>
  <!-- Title -->
  <text x="48" y="46" font-family="Segoe UI,Arial,sans-serif" font-size="22" font-weight="700" fill="#0f172a">Multi-Agent Orchestration Patterns</text>
  <text x="48" y="68" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">Five reusable coordination patterns for Azure AI multi-agent systems.</text>

  <!-- ROW 1: 3 cells -->
  <!-- Cell 1: Sequential (x=30,y=85,w=280,h=185) -->
  <rect x="30" y="85" width="280" height="185" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="170" y="109" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">Sequential (pipeline)</text>
  <!-- 3 node boxes -->
  <rect x="44" y="155" width="66" height="30" rx="5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="77" y="175" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1f2937">Extract</text>
  <rect x="130" y="155" width="66" height="30" rx="5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="163" y="175" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1f2937">Classify</text>
  <rect x="216" y="155" width="66" height="30" rx="5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="249" y="175" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1f2937">Enrich</text>
  <!-- Arrows -->
  <line x1="110" y1="170" x2="128" y2="170" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="196" y1="170" x2="214" y2="170" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>
  <!-- Description -->
  <text x="170" y="223" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64748b">Agents run in fixed order.</text>
  <text x="170" y="239" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64748b">Output of each feeds next.</text>
  <text x="170" y="255" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64748b">Deterministic flow.</text>

  <!-- Cell 2: Concurrent (x=340,y=85,w=280,h=185) -->
  <rect x="340" y="85" width="280" height="185" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="480" y="109" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">Concurrent (fan-out)</text>
  <!-- Source box -->
  <rect x="354" y="153" width="60" height="36" rx="5" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="384" y="175" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#1f2937">Source</text>
  <!-- 3 target boxes -->
  <rect x="450" y="123" width="60" height="30" rx="5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="480" y="143" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#1f2937">Agent A</text>
  <rect x="450" y="157" width="60" height="30" rx="5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="480" y="177" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#1f2937">Agent B</text>
  <rect x="450" y="191" width="60" height="30" rx="5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="480" y="211" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#1f2937">Agent C</text>
  <!-- Merge box -->
  <rect x="544" y="153" width="60" height="36" rx="5" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="574" y="175" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#1f2937">Merge</text>
  <!-- Fan-out arrows -->
  <line x1="414" y1="171" x2="448" y2="138" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr2)"/>
  <line x1="414" y1="171" x2="448" y2="172" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr2)"/>
  <line x1="414" y1="171" x2="448" y2="206" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr2)"/>
  <!-- Fan-in arrows -->
  <line x1="510" y1="138" x2="542" y2="166" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr2)"/>
  <line x1="510" y1="172" x2="542" y2="171" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr2)"/>
  <line x1="510" y1="206" x2="542" y2="178" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr2)"/>
  <!-- Description -->
  <text x="480" y="239" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64748b">Agents run in parallel.</text>
  <text x="480" y="255" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64748b">Results merged by aggregator.</text>

  <!-- Cell 3: Group Chat (x=650,y=85,w=280,h=185) -->
  <rect x="650" y="85" width="280" height="185" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="790" y="109" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">Group Chat (maker-checker)</text>
  <!-- Maker box (top center) -->
  <rect x="750" y="121" width="80" height="32" rx="5" fill="#fdf2f8" stroke="#b83280" stroke-width="1.5"/>
  <text x="790" y="141" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1f2937">Maker</text>
  <!-- Reviewer box (bottom left) -->
  <rect x="680" y="190" width="80" height="32" rx="5" fill="#fdf2f8" stroke="#b83280" stroke-width="1.5"/>
  <text x="720" y="210" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1f2937">Reviewer</text>
  <!-- Validator box (bottom right) -->
  <rect x="820" y="190" width="80" height="32" rx="5" fill="#fdf2f8" stroke="#b83280" stroke-width="1.5"/>
  <text x="860" y="210" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1f2937">Validator</text>
  <!-- Connecting lines -->
  <line x1="790" y1="153" x2="720" y2="190" stroke="#b83280" stroke-width="1.2"/>
  <line x1="790" y1="153" x2="860" y2="190" stroke="#b83280" stroke-width="1.2"/>
  <line x1="760" y1="206" x2="820" y2="206" stroke="#b83280" stroke-width="1.2"/>
  <!-- Description -->
  <text x="790" y="243" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64748b">Agents review each other.</text>
  <text x="790" y="259" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64748b">Shared conversation context.</text>

  <!-- ROW 2: 2 cells -->
  <!-- Cell 4: Handoff (x=180,y=290,w=280,h=185) -->
  <rect x="180" y="290" width="280" height="185" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="320" y="314" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">Handoff (dynamic routing)</text>
  <!-- Coordinator box -->
  <rect x="280" y="326" width="80" height="34" rx="5" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="320" y="347" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1f2937">Coordinator</text>
  <!-- HR Agent -->
  <rect x="202" y="390" width="76" height="32" rx="5" fill="#fdf2f8" stroke="#b83280" stroke-width="1.5"/>
  <text x="240" y="410" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1f2937">HR Agent</text>
  <!-- IT Agent -->
  <rect x="362" y="390" width="76" height="32" rx="5" fill="#fdf2f8" stroke="#b83280" stroke-width="1.5"/>
  <text x="400" y="410" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1f2937">IT Agent</text>
  <!-- Arrows from coordinator -->
  <line x1="300" y1="360" x2="255" y2="388" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="340" y1="360" x2="385" y2="388" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>
  <!-- Description -->
  <text x="320" y="444" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64748b">Coordinator routes to specialist.</text>
  <text x="320" y="460" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64748b">Agents hand off context.</text>

  <!-- Cell 5: Magentic (x=500,y=290,w=280,h=185) -->
  <rect x="500" y="290" width="280" height="185" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="640" y="314" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">Magentic (open-ended planning)</text>
  <!-- Orchestrator box -->
  <rect x="530" y="326" width="90" height="34" rx="5" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="575" y="347" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1f2937">Orchestrator</text>
  <!-- Task Ledger box -->
  <rect x="660" y="326" width="88" height="34" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="704" y="347" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1f2937">Task Ledger</text>
  <!-- 3 worker boxes -->
  <rect x="508" y="390" width="60" height="30" rx="5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="538" y="410" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#1f2937">Worker 1</text>
  <rect x="610" y="390" width="60" height="30" rx="5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="640" y="410" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#1f2937">Worker 2</text>
  <rect x="712" y="390" width="60" height="30" rx="5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="742" y="410" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#1f2937">Worker 3</text>
  <!-- Arrows from orchestrator to workers -->
  <line x1="555" y1="360" x2="530" y2="388" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr2)"/>
  <line x1="575" y1="360" x2="640" y2="388" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr2)"/>
  <line x1="590" y1="360" x2="720" y2="388" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr2)"/>
  <!-- Description -->
  <text x="640" y="444" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64748b">Orchestrator decomposes tasks.</text>
  <text x="640" y="460" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64748b">Workers execute, ledger tracks progress.</text>

  <!-- Footer -->
  <text x="48" y="516" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#64748b">Choose the pattern based on dependency structure, failure handling, and observability requirements.</text>
</svg>