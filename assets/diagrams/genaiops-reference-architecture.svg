<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" fill="none">
  <rect width="800" height="440" rx="12" fill="#15212f"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#ffffff">GenAI Reference Architecture</text>

  <!-- User -->
  <rect x="30" y="170" width="100" height="60" rx="8" fill="#334155"/>
  <text x="80" y="196" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#ffffff">User</text>
  <text x="80" y="214" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#94a3b8">App / Chat</text>

  <!-- API Gateway -->
  <rect x="170" y="150" width="110" height="100" rx="8" fill="#b83280"/>
  <text x="225" y="185" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#ffffff">API Gateway</text>
  <text x="225" y="202" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#fbcfe8">Auth · Rate limit</text>
  <text x="225" y="216" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#fbcfe8">Routing · Logging</text>
  <text x="225" y="230" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#fbcfe8">Quotas · Failover</text>

  <!-- Orchestrator/Agent -->
  <rect x="320" y="150" width="120" height="100" rx="8" fill="#1d4ed8"/>
  <text x="380" y="185" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Orchestrator</text>
  <text x="380" y="202" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#93c5fd">Agent / Workflow</text>
  <text x="380" y="216" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#93c5fd">Tool calls</text>
  <text x="380" y="230" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#93c5fd">Prompt mgmt</text>

  <!-- Model -->
  <rect x="490" y="120" width="120" height="70" rx="8" fill="#0f766e"/>
  <text x="550" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Model</text>
  <text x="550" y="167" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#99f6e4">Azure OpenAI</text>
  <text x="550" y="181" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#99f6e4">Foundry models</text>

  <!-- Retrieval -->
  <rect x="490" y="220" width="120" height="70" rx="8" fill="#4f46e5"/>
  <text x="550" y="250" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Retrieval</text>
  <text x="550" y="267" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#c7d2fe">AI Search · Index</text>
  <text x="550" y="281" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#c7d2fe">Vector + keyword</text>

  <!-- Safety -->
  <rect x="660" y="150" width="110" height="100" rx="8" fill="#b91c1c"/>
  <text x="715" y="185" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Safety</text>
  <text x="715" y="202" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#fecaca">Content filters</text>
  <text x="715" y="216" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#fecaca">Prompt shields</text>
  <text x="715" y="230" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#fecaca">Groundedness</text>

  <!-- Telemetry bar -->
  <rect x="30" y="320" width="740" height="50" rx="8" fill="#166534"/>
  <text x="400" y="345" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Telemetry &amp; Observability</text>
  <text x="400" y="361" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#bbf7d0">Azure Monitor · App Insights · OpenTelemetry · Token metrics · Safety events · Feedback</text>

  <!-- Cost bar -->
  <rect x="30" y="380" width="740" height="40" rx="8" fill="#a15c00"/>
  <text x="400" y="404" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Cost Management &amp; FinOps</text>

  <!-- Arrows -->
  <line x1="130" y1="200" x2="170" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="280" y1="200" x2="320" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="440" y1="185" x2="490" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="440" y1="215" x2="490" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="610" y1="155" x2="660" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="610" y1="255" x2="660" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Vertical connectors to telemetry -->
  <line x1="225" y1="250" x2="225" y2="320" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="380" y1="250" x2="380" y2="320" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="550" y1="290" x2="550" y2="320" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="715" y1="250" x2="715" y2="320" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>

  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
</svg>
