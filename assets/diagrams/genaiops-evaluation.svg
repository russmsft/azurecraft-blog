<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="12" fill="#15212f"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Evaluation: Demo to Production Confidence</text>

  <!-- Test dataset -->
  <rect x="40" y="100" width="130" height="80" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="105" y="130" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Test Dataset</text>
  <text x="105" y="148" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#94a3b8">Common questions</text>
  <text x="105" y="162" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#94a3b8">Edge cases · Failures</text>

  <!-- AI System -->
  <rect x="230" y="100" width="130" height="80" rx="8" fill="#1d4ed8"/>
  <text x="295" y="130" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#ffffff">AI System</text>
  <text x="295" y="148" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#93c5fd">Prompt + Model</text>
  <text x="295" y="162" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#93c5fd">+ Retrieval</text>

  <!-- Quality gates -->
  <rect x="420" y="70" width="160" height="140" rx="8" fill="#0f766e"/>
  <text x="500" y="96" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Quality Gates</text>
  <line x1="440" y1="106" x2="560" y2="106" stroke="#134e4a" stroke-width="1"/>
  <text x="500" y="124" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#99f6e4">✓ Groundedness</text>
  <text x="500" y="142" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#99f6e4">✓ Relevance</text>
  <text x="500" y="160" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#99f6e4">✓ Coherence</text>
  <text x="500" y="178" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#99f6e4">✓ Safety</text>
  <text x="500" y="196" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#99f6e4">✓ Task success</text>

  <!-- Decision -->
  <polygon points="670,140 720,110 770,140 720,170" fill="#a15c00"/>
  <text x="720" y="144" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Pass?</text>

  <!-- Arrows -->
  <line x1="170" y1="140" x2="230" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arr3)"/>
  <line x1="360" y1="140" x2="420" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arr3)"/>
  <line x1="580" y1="140" x2="670" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Pass label -->
  <text x="720" y="98" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#4ade80">✓ Release</text>
  <!-- Fail label -->
  <text x="720" y="198" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#f87171">✗ Iterate</text>

  <!-- Feedback loop arrow -->
  <path d="M720 170 L720 250 L295 250 L295 180" stroke="#f87171" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arr3r)"/>
  <text x="500" y="268" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#94a3b8">Improve prompts, retrieval, data, or model selection</text>

  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arr3r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
    </marker>
  </defs>
</svg>
