<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <rect width="800" height="340" rx="12" fill="#15212f"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#ffffff">GenAI Governance &amp; Team Model</text>

  <!-- Roles row -->
