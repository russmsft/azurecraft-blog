  <rect x="30" y="82" width="140" height="48" rx="6" fill="#1d4ed8"/>
  <text x="100" y="106" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Use Case Owner</text>
  <text x="100" y="122" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#93c5fd">Outcome &amp; quality</text>

  <rect x="185" y="82" width="140" height="48" rx="6" fill="#0f766e"/>
